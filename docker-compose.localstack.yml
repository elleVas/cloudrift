# Used only by `pnpm nx run cli:e2e-localstack` (scripts/e2e-localstack.mjs).
# Not part of lint/test/build/typecheck — opt-in e2e harness, see docs/adr/0002-localstack-e2e-scope.md.
services:
  localstack:
    # Pinned, not `latest`: as of 2026-06, the `latest` tag resolves to the
    # Pro/Enterprise image, which refuses to start at all without a paid
    # license token (even for free/Community-tier services). 4.14.0 is the
    # newest confirmed Community-only image that starts with no token and
    # includes the CloudWatch multi-protocol fix (see
    # docs/adr/0039-cloudwatch-localstack-incompatibility.md).
    image: localstack/localstack:4.14.0
    ports:
      - '4566:4566'
    environment:
      - PERSISTENCE=0
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN:-}
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4566/_localstack/health']
      interval: 5s
      timeout: 5s
      retries: 24
