name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
# Disables Nx Cloud for all jobs below
env:
  NX_NO_CLOUD: "true"
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: '10.33.0'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm nx run-many --target=lint --all --parallel

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: '10.33.0'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm nx run-many --target=test --all --parallel

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: '10.33.0'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm nx run-many --target=build --all --parallel

  e2e-localstack:
    name: E2E (LocalStack)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: '10.33.0'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm nx run cli:build

      # Retries up to 3 times: LocalStack Community's single-process gateway
      # occasionally resets a connection under concurrent load ("socket hang
      # up" on a random resource kind, not the same one each time) — an
      # environmental flakiness, not a code defect. See ADR-0063 (supersedes
      # ADR-0062). CLOUDRIFT_SCAN_CONCURRENCY lets this be tuned from the
      # GitHub UI (Settings > Secrets and variables > Actions > Variables)
      # without a code change; scripts/e2e-localstack.mjs falls back to 1
      # if the repo variable isn't set.
      - name: Run LocalStack e2e harness
        run: |
          for attempt in 1 2 3; do
            echo "::group::Attempt $attempt/3"
            pnpm nx run cli:e2e-localstack
            status=$?
            echo "::endgroup::"
            if [ $status -eq 0 ]; then
              exit 0
            fi
            echo "Attempt $attempt failed (exit $status)."
          done
          exit $status
        env:
          LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}
          CLOUDRIFT_SCAN_CONCURRENCY: ${{ vars.CLOUDRIFT_SCAN_CONCURRENCY }}
